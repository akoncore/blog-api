services:
  # Redis 
  redis:
    image: redis:7-alpine
    container_name: blog_redis
    #ports:
    # - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: blog_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

  # Django web сервер (Daphne - ASGI)
  web:
    build: .
    container_name: blog_web
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - sqlite_db:/app/db
    #ports:
    #  - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery worker
  celery_worker:
    build: .
    container_name: blog_celery_workerdrf-guide
    command: celery -A settings worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery beat 
  celery_beat:
    build: .
    container_name: blog_celery_beat
    command: celery -A settings beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Flower 
  flower:
    build: .
    container_name: blog_flower
    command: celery -A settings flower --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  static_volume:
  media_volume:
  sqlite_db: